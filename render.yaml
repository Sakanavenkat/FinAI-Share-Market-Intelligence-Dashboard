services:
  - type: web
    name: finai-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run src/dashboard/app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0