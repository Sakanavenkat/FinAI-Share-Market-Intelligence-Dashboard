version: "3.9"

services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: .
    command: uvicorn src.api.routes:app --host=0.0.0.0 --port=8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  scheduler:
    build: .
    command: python scripts/daily_pipeline.py --loop
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
